name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions: read-all

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Smoke tests
        run: go test -run 'TestSmoke|Contract' -race ./...

  test:
    name: Test
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -v -race ./...

  bench:
    name: Benchmarks
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run benchmarks
        # Execute every benchmark a few times to catch panics and compile rot
        # in the hot paths; this is a correctness check, not a perf gate
        # (shared CI runners are too noisy for reliable timing thresholds).
        run: go test -run '^$' -bench=. -benchmem -benchtime=10x ./...

      - name: Check allocation invariants
        # Allocation counts are deterministic (unlike ns/op on shared runners), so
        # per-benchmark allocs/op ceilings are a safe, meaningful regression gate.
        # Bump a ceiling here deliberately when a real change adds an allocation.
        run: |
          set -euo pipefail
          check() {
            local bench=$1 max=$2
            echo "checking $bench (max ${max} allocs/op)"
            go test -run '^$' -bench="^${bench}$" -benchmem -benchtime=100x . \
              | awk -v max="$max" -v name="$bench" '
                  /allocs\/op/ {
                    for (i = 1; i <= NF; i++) {
                      if ($i == "allocs/op" && $(i-1)+0 > max+0) {
                        printf "ALLOC REGRESSION: %s = %s allocs/op (max %s)\n    %s\n", name, $(i-1), max, $0
                        bad = 1
                      }
                    }
                  }
                  END { exit bad }'
          }
          check BenchmarkMemoryStoreCount 0
          check BenchmarkMemoryStoreDeleteOlderThan 0
          check BenchmarkMemoryStoreGet 4
          echo "allocation invariants OK"

  fuzz-sync:
    name: Fuzz Target Sync
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Verify fuzz target lists match the source
        # Every Fuzz* function must be listed in both the CI matrix below and the
        # ClusterFuzzLite build, so a new target can't be silently left un-fuzzed.
        run: |
          src=$(grep -ohE '^func (Fuzz[A-Za-z0-9_]+)' *_test.go | awk '{print $2}' | sort -u)
          ci=$(grep -oE '^[[:space:]]*- Fuzz[A-Za-z0-9_]+' .github/workflows/ci.yml | grep -oE 'Fuzz[A-Za-z0-9_]+' | sort -u)
          bsh=$(grep -oE ' Fuzz[A-Za-z0-9_]+ ' .clusterfuzzlite/build.sh | grep -oE 'Fuzz[A-Za-z0-9_]+' | sort -u)
          if [ "$src" != "$ci" ]; then echo "drift: source vs ci.yml fuzz matrix"; diff <(echo "$src") <(echo "$ci") || true; exit 1; fi
          if [ "$src" != "$bsh" ]; then echo "drift: source vs ClusterFuzzLite build.sh"; diff <(echo "$src") <(echo "$bsh") || true; exit 1; fi
          echo "fuzz targets in sync:"; echo "$src"

  fuzz:
    name: Fuzz
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - FuzzMatchesFilter
          - FuzzNormalizeErrorType
          - FuzzStoreAndFilterMessages
          - FuzzReplayCount
          - FuzzTerminalErrorMatching
          - FuzzRedisParseMessage
          - FuzzMemoryDedupUpsert
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Fuzz ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
        # Short bounded fuzz run for fast per-PR crash regression coverage;
        # deep/continuous fuzzing is handled by the ClusterFuzzLite workflow.
        run: go test -run '^$' -fuzz="^${TARGET}$" -fuzztime=45s .

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.11.4
          args: --tests=false

  integration:
    name: Integration Tests
    needs: smoke
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.runCommand({ping:1}).ok'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Run integration tests
        env:
          MONGO_URI: mongodb://localhost:27017
          POSTGRES_URI: postgres://postgres:postgres@localhost:5432/test?sslmode=disable
          REDIS_URI: localhost:6379
        run: go test -tags integration -race -coverpkg=github.com/rbaliyan/event-dlq -coverprofile=coverage.out ./...

      - name: Enforce coverage threshold
        env:
          COVERAGE_THRESHOLD: "85"
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "Total coverage: ${total}% (threshold: ${COVERAGE_THRESHOLD}%)"
          awk -v total="$total" -v threshold="$COVERAGE_THRESHOLD" 'BEGIN {
            if (total + 0 < threshold + 0) {
              printf "FAIL: coverage %.1f%% is below the %d%% threshold\n", total, threshold
              exit 1
            }
            printf "OK: coverage %.1f%% meets the %d%% threshold\n", total, threshold
          }'

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          languages: go

      - name: Autobuild
        uses: github/codeql-action/autobuild@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v3
        with:
          category: "/language:go"
